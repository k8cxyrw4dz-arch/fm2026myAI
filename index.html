<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>프리미어리그 선수 검색</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f2f5ee;
      --ink: #11201a;
      --muted: #53645b;
      --card: #fbfdf7;
      --line: #d5dfcf;
      --brand: #0f5b3f;
      --brand-soft: #dff2e6;
      --accent: #d89f2b;
      --radius: 18px;
      --shadow: 0 14px 28px rgba(16, 31, 22, 0.1);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--ink);
      font-family: "Noto Sans KR", sans-serif;
      background:
        radial-gradient(circle at 15% 10%, #e5f5eb 0%, transparent 34%),
        radial-gradient(circle at 90% 100%, #f8eccf 0%, transparent 28%),
        var(--bg);
      min-height: 100vh;
    }

    .wrap {
      max-width: 1180px;
      margin: 0 auto;
      padding: 24px 16px 52px;
    }

    .hero {
      background: linear-gradient(120deg, #0d3e2d 0%, #176347 58%, #1f7b57 100%);
      border-radius: 24px;
      padding: 24px;
      color: #f4fff8;
      box-shadow: var(--shadow);
    }

    h1 {
      margin: 0;
      font-family: "Space Grotesk", sans-serif;
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      letter-spacing: 0.02em;
    }

    .sub {
      margin-top: 8px;
      color: #d9f4e3;
      font-size: 0.96rem;
    }

    .stats {
      margin-top: 12px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .chip {
      border: 1px solid rgba(255, 255, 255, 0.35);
      background: rgba(255, 255, 255, 0.11);
      border-radius: 999px;
      padding: 6px 11px;
      font-size: 0.83rem;
      font-weight: 600;
    }

    .panel {
      margin-top: 14px;
      display: grid;
      grid-template-columns: 1.2fr 1fr 1fr;
      gap: 10px;
    }

    .field {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 11px;
      box-shadow: var(--shadow);
    }

    .field label {
      display: block;
      font-size: 0.78rem;
      color: var(--muted);
      margin-bottom: 7px;
      font-weight: 700;
    }

    .field input,
    .field select {
      width: 100%;
      border: 1px solid #becdbc;
      border-radius: 11px;
      padding: 10px;
      font-size: 0.94rem;
      background: #fff;
      color: var(--ink);
    }

    .field input:focus,
    .field select:focus {
      outline: 2px solid var(--accent);
      border-color: transparent;
    }

    .status {
      margin-top: 10px;
      font-size: 0.86rem;
      color: var(--muted);
    }

    .grid {
      margin-top: 16px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(255px, 1fr));
      gap: 12px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 12px;
      box-shadow: var(--shadow);
    }

    .top {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .avatar {
      width: 62px;
      height: 62px;
      border-radius: 14px;
      background: linear-gradient(145deg, #eef5e7 0%, #dbe9d4 100%);
      border: 1px solid #cfe0ca;
      object-fit: cover;
      flex: 0 0 auto;
    }

    .name {
      margin: 0;
      font-family: "Space Grotesk", sans-serif;
      font-size: 1.04rem;
      line-height: 1.2;
    }

    .meta {
      margin-top: 3px;
      font-size: 0.84rem;
      color: var(--muted);
    }

    .row {
      margin-top: 10px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      font-size: 0.86rem;
    }

    .box {
      border: 1px solid #dbe6d7;
      background: #f7fbf2;
      border-radius: 10px;
      padding: 8px;
    }

    .key {
      display: block;
      color: #607368;
      font-size: 0.73rem;
      margin-bottom: 2px;
      font-weight: 700;
    }

    .val {
      font-weight: 700;
      font-size: 0.88rem;
    }

    .empty {
      margin-top: 14px;
      border: 1px dashed #c3d2bf;
      border-radius: 16px;
      padding: 26px;
      text-align: center;
      color: var(--muted);
      background: #f8fcf5;
    }

    @media (max-width: 900px) {
      .panel { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>Premier League Player Finder</h1>
      <p class="sub">현재 시각 기준 데이터는 페이지 로드 시 API 응답값을 사용합니다.</p>
      <div class="stats">
        <span class="chip" id="count-chip">선수 0명</span>
        <span class="chip" id="team-chip">팀 0개</span>
        <span class="chip" id="time-chip">업데이트 준비중</span>
      </div>
    </section>

    <section class="panel">
      <div class="field">
        <label for="q">검색</label>
        <input id="q" type="text" placeholder="선수명, 팀명, 국적으로 검색" />
      </div>
      <div class="field">
        <label for="club">클럽</label>
        <select id="club"><option value="">전체 클럽</option></select>
      </div>
      <div class="field">
        <label for="pos">포지션</label>
        <select id="pos"><option value="">전체 포지션</option></select>
      </div>
    </section>

    <div class="status" id="status">데이터를 불러오는 중입니다...</div>
    <main id="result" class="grid"></main>
  </div>

  <script>
    const BASE = "https://www.thesportsdb.com/api/v1/json/123";
    const LEAGUE = "English_Premier_League";

    const state = {
      players: [],
      filtered: [],
      teams: [],
      loadedAt: null
    };

    const qEl = document.getElementById("q");
    const clubEl = document.getElementById("club");
    const posEl = document.getElementById("pos");
    const statusEl = document.getElementById("status");
    const resultEl = document.getElementById("result");
    const countChip = document.getElementById("count-chip");
    const teamChip = document.getElementById("team-chip");
    const timeChip = document.getElementById("time-chip");

    async function fetchJson(url) {
      const res = await fetch(url);
      if (!res.ok) throw new Error(`API 실패: ${res.status}`);
      return res.json();
    }

    function normalizePlayer(raw, teamName) {
      return {
        id: raw.idPlayer || `${raw.strPlayer}-${teamName}`,
        name: raw.strPlayer || "이름 없음",
        position: raw.strPosition || "정보 없음",
        nationality: raw.strNationality || "정보 없음",
        birth: raw.dateBorn || "정보 없음",
        team: teamName,
        avatar: raw.strCutout || raw.strThumb || "",
        wage: raw.strWage || "정보 없음",
        value: raw.strValue || "정보 없음"
      };
    }

    async function loadPlayers() {
      statusEl.textContent = "프리미어리그 팀 목록을 가져오는 중...";
      const teamRes = await fetchJson(`${BASE}/search_all_teams.php?l=${LEAGUE}`);
      const teams = (teamRes.teams || [])
        .filter((t) => t.strSport === "Soccer")
        .map((t) => ({ id: t.idTeam, name: t.strTeam }))
        .sort((a, b) => a.name.localeCompare(b.name));

      state.teams = teams;
      teamChip.textContent = `팀 ${teams.length}개`;

      const all = [];
      const chunkSize = 4;

      for (let i = 0; i < teams.length; i += chunkSize) {
        const chunk = teams.slice(i, i + chunkSize);
        statusEl.textContent = `선수 데이터 수집 중... (${Math.min(i + chunk.length, teams.length)}/${teams.length}팀)`;

        const settled = await Promise.allSettled(
          chunk.map(async (team) => {
            const res = await fetchJson(`${BASE}/lookup_all_players.php?id=${team.id}`);
            const rows = res.player || [];
            return rows.map((raw) => normalizePlayer(raw, team.name));
          })
        );

        settled.forEach((r) => {
          if (r.status === "fulfilled") all.push(...r.value);
        });
      }

      const dedup = new Map();
      all.forEach((p) => dedup.set(p.id, p));
      state.players = Array.from(dedup.values()).sort((a, b) => a.name.localeCompare(b.name));
      state.loadedAt = new Date();
      populateFilters();
      applyFilters();
    }

    function populateFilters() {
      const teamNames = [...new Set(state.players.map((p) => p.team))].sort((a, b) => a.localeCompare(b));
      const positions = [...new Set(state.players.map((p) => p.position))].sort((a, b) => a.localeCompare(b));

      clubEl.innerHTML = '<option value="">전체 클럽</option>' +
        teamNames.map((n) => `<option value="${n}">${n}</option>`).join("");

      posEl.innerHTML = '<option value="">전체 포지션</option>' +
        positions.map((p) => `<option value="${p}">${p}</option>`).join("");
    }

    function applyFilters() {
      const q = qEl.value.trim().toLowerCase();
      const club = clubEl.value;
      const pos = posEl.value;

      state.filtered = state.players.filter((p) => {
        const passQ = !q || [p.name, p.team, p.nationality].join(" ").toLowerCase().includes(q);
        const passClub = !club || p.team === club;
        const passPos = !pos || p.position === pos;
        return passQ && passClub && passPos;
      });

      countChip.textContent = `선수 ${state.filtered.length}명`;
      timeChip.textContent = state.loadedAt
        ? `업데이트 ${state.loadedAt.toLocaleString("ko-KR")}`
        : "업데이트 준비중";

      statusEl.textContent = `현재 시점 EPL 선수 데이터 ${state.players.length}명 중 ${state.filtered.length}명 표시`;
      render();
    }

    function render() {
      if (!state.filtered.length) {
        resultEl.innerHTML = '<div class="empty">조건에 맞는 선수가 없습니다.</div>';
        return;
      }

      resultEl.innerHTML = state.filtered.map((p) => `
        <article class="card">
          <div class="top">
            <img class="avatar" src="${p.avatar || ""}" alt="${p.name}" onerror="this.style.display='none'" />
            <div>
              <h3 class="name">${p.name}</h3>
              <div class="meta">${p.team}</div>
            </div>
          </div>
          <div class="row">
            <div class="box"><span class="key">포지션</span><span class="val">${p.position}</span></div>
            <div class="box"><span class="key">국적</span><span class="val">${p.nationality}</span></div>
            <div class="box"><span class="key">생년월일</span><span class="val">${p.birth}</span></div>
            <div class="box"><span class="key">추정 가치/연봉</span><span class="val">${p.value} / ${p.wage}</span></div>
          </div>
        </article>
      `).join("");
    }

    [qEl, clubEl, posEl].forEach((el) => el.addEventListener("input", applyFilters));

    loadPlayers().catch((err) => {
      statusEl.textContent = "데이터를 불러오지 못했습니다. 잠시 후 새로고침해 주세요.";
      resultEl.innerHTML = `<div class="empty">오류: ${err.message}</div>`;
    });
  </script>
</body>
</html>
